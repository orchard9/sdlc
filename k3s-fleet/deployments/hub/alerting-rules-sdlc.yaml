# SDLC fleet alerting rules.
#
# These rules supplement the cluster-wide prometheus-alerting-rules configmap
# in the observability namespace. They are NOT applied by kubectl apply on this
# file directly — Prometheus reads a single merged rules file.
#
# To install/update, run:
#   kubectl patch configmap prometheus-alerting-rules -n observability \
#     --patch "$(cat k3s-fleet/deployments/hub/alerting-rules-sdlc.yaml | \
#       python3 -c 'import sys,yaml,json; d=yaml.safe_load(sys.stdin); print(json.dumps({"data":{"alerting-rules.yaml": d["rules"]}}))')"
#
# Or use the simpler helper in docs/cluster-operations.md.
#
# rules: content to append to the prometheus-alerting-rules configmap (YAML group format)
rules: |
  - name: sdlc-hub-alerts
    rules:
    - alert: SdlcHubDown
      expr: kube_deployment_status_replicas_available{namespace="sdlc-hub",deployment="sdlc-hub"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "SDLC hub is down"
        description: "The sdlc-hub deployment has 0 available replicas for 2+ minutes. Fleet management and OAuth are unavailable."

    - alert: SdlcHubCrashLooping
      expr: increase(kube_pod_container_status_restarts_total{namespace="sdlc-hub"}[30m]) > 2
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "SDLC hub pod is crash-looping"
        description: "Pod {{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last 30 minutes."

  - name: sdlc-project-alerts
    rules:
    - alert: SdlcProjectCrashLooping
      expr: increase(kube_pod_container_status_restarts_total{namespace=~"sdlc-[a-z].*",container="sdlc-server"}[1h]) > 3
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "SDLC project pod crash-looping: {{ $labels.namespace }}"
        description: "Container sdlc-server in {{ $labels.namespace }} has restarted {{ $value | printf \"%.0f\" }} times in the last hour."

    - alert: SdlcWorkspacePVCFull
      expr: |
        (kubelet_volume_stats_used_bytes{namespace=~"sdlc-[a-z].*",persistentvolumeclaim=~"workspace-.*"}
          / kubelet_volume_stats_capacity_bytes{namespace=~"sdlc-[a-z].*",persistentvolumeclaim=~"workspace-.*"}) > 0.85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "SDLC workspace volume >85% full: {{ $labels.namespace }}"
        description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value | humanizePercentage }} full."

    - alert: SdlcProvisionStuck
      expr: kube_pod_status_phase{namespace=~"sdlc-[a-z].*",phase="Pending"} == 1
      for: 20m
      labels:
        severity: warning
      annotations:
        summary: "SDLC project pod stuck provisioning: {{ $labels.namespace }}"
        description: "Pod {{ $labels.pod }} has been Pending for 20+ minutes — check events and PVC binding."
