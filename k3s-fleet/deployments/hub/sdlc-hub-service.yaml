apiVersion: v1
kind: Service
metadata:
  name: sdlc-hub
  namespace: sdlc-hub
  labels:
    app.kubernetes.io/name: sdlc-hub
    app.kubernetes.io/managed-by: sdlc-fleet
spec:
  type: ClusterIP
  selector:
    app: sdlc-hub
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
