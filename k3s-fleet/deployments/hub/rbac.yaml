apiVersion: v1
kind: ServiceAccount
metadata:
  name: sdlc-hub
  namespace: sdlc-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sdlc-hub-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sdlc-hub-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sdlc-hub-reader
subjects:
  - kind: ServiceAccount
    name: sdlc-hub
    namespace: sdlc-hub
