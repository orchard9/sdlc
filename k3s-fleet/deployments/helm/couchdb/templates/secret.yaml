{{- if eq .Values.credentials.password "" }}
{{- fail "credentials.password must be set: helm install ... --set credentials.password=<value>" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: couchdb-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app: couchdb
type: Opaque
stringData:
  user: {{ .Values.credentials.user | quote }}
  password: {{ .Values.credentials.password | quote }}
