apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace-{{ .Values.project.slug }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep   # Preserve workspace data on helm uninstall
  labels:
    app.kubernetes.io/name: sdlc-server
    app.kubernetes.io/instance: {{ .Values.project.slug }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
