apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sdlc-{{ .Values.project.slug }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: sdlc-server
    app.kubernetes.io/instance: {{ .Values.project.slug }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.project.slug }}.{{ .Values.ingress.domain }}`)
      kind: Rule
      services:
        - name: sdlc-server-{{ .Values.project.slug }}
          port: 80
      {{- if .Values.auth.enabled }}
      middlewares:
        - name: sdlc-google-auth
      {{- end }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
