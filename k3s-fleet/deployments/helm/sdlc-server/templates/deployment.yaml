apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdlc-server-{{ .Values.project.slug }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: sdlc-server
    app.kubernetes.io/instance: {{ .Values.project.slug }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sdlc-server
      app.kubernetes.io/instance: {{ .Values.project.slug }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdlc-server
        app.kubernetes.io/instance: {{ .Values.project.slug }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: workspace
          emptyDir: {}
      initContainers:
        - name: git-sync-init
          image: {{ .Values.image.gitSync }}
          args:
            - --repo={{ .Values.gitea.url }}/{{ .Values.project.repo }}.git
            - --ref={{ .Values.project.branch }}
            - --root=/workspace
            - --link={{ .Values.project.slug }}
            - --one-time
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gitea-credentials
                  key: username
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-credentials
                  key: token
      containers:
        - name: sdlc-server
          image: {{ .Values.image.server }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: {{ .Values.resources.server.requests.cpu }}
              memory: {{ .Values.resources.server.requests.memory }}
            limits:
              cpu: {{ .Values.resources.server.limits.cpu }}
              memory: {{ .Values.resources.server.limits.memory }}
          env:
            - name: SDLC_ROOT
              value: /workspace/{{ .Values.project.slug }}
            - name: SDLC_HUB_URL
              value: https://{{ .Values.ingress.domain }}
            - name: SDLC_BASE_URL
              value: https://{{ .Values.project.slug }}.{{ .Values.ingress.domain }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-credentials
                  key: api_key
                  optional: true
            {{- if .Values.postgres.externalSecret.gsmKey }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-sdlc-credentials
                  key: DATABASE_URL
            {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: git-sync
          image: {{ .Values.image.gitSync }}
          args:
            - --repo={{ .Values.gitea.url }}/{{ .Values.project.repo }}.git
            - --ref={{ .Values.project.branch }}
            - --root=/workspace
            - --link={{ .Values.project.slug }}
            - --period=30s
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gitea-credentials
                  key: username
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-credentials
                  key: token
          resources:
            requests:
              cpu: {{ .Values.resources.gitSync.requests.cpu }}
              memory: {{ .Values.resources.gitSync.requests.memory }}
            limits:
              cpu: {{ .Values.resources.gitSync.limits.cpu }}
              memory: {{ .Values.resources.gitSync.limits.memory }}
