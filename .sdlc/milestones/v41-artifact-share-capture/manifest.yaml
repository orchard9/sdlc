slug: v41-artifact-share-capture
title: Artifact Share & Capture — one-click copy and screenshot for artifacts and dialogue
vision: Users can copy and capture any artifact or dialogue message in one click. No OS-level screenshot keybindings, no manual text selection, no manual cropping. Open a spec — click [MD] to copy its markdown, click [IMG] to copy it as an image ready to paste directly into Slack, email, or Discord. In a ponder session, hover any message and click copy to quote it anywhere. The sdlc UI becomes a first-class sharing surface, not just a viewing surface.
