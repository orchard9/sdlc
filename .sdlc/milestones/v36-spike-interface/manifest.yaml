slug: v36-spike-interface
title: Spike Interface — surface spikes, promote to ponder, file rejects to knowledge
vision: After running a spike, your findings are immediately visible in the web UI — verdict badges, one-liner needs, full structured findings on click. ADAPT spikes promote to a pre-seeded ponder in one step (findings + open questions carried forward). REJECT spikes auto-file to the knowledge base with no manual action. ADOPT spikes show a clear next-step hint toward hypothetical planning. Nothing is lost; nothing requires manual filing.
