title: 'sdlc-cluster: Fleet automation and full provisioning'
vision: >
  Every repo in the orchard9 Gitea org automatically gets a live sdlc-server instance —
  no manual action required per project. A scheduled Woodpecker reconcile pipeline handles
  new repos, TLS is wildcard-automated, and the initial 80+ existing projects are provisioned
  in a single bootstrap run.
