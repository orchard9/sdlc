slug: v13-backlog
title: 'Project-level backlog: capture and promote out-of-scope concerns'
vision: Agents capture out-of-scope concerns at the moment of discovery — a single command writes a durable, ID-confirmed backlog item with kind (concern, idea, or debt), description, and auto-inferred source feature. Items aggregate on the Dashboard where operators triage, park with a note, or promote to a feature in a specific milestone. Nothing observed during autonomous execution is lost between sessions.
