slug: v26-html-design-artifacts
title: HTML Design Artifacts — visual mockups replace prose design docs
vision: |
  When an agent designs a UI in a ponder session or creates a feature design, it produces a browser-openable HTML mockup instead of a Markdown prose description — making design review immediate and visual. Agents no longer write paragraphs describing layouts; they write layouts. Reviewers open a file and see the design, not imagine it.
