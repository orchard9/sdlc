slug: v10-knowledge-capture
title: 'Knowledge base: capture and organize'
vision: A developer or agent can capture knowledge from any source — URL (with title+meta, no synthesis yet), local file, or written content — browse it through an emergent taxonomy, and find it in seconds by full-text search across titles, summaries, and content. The librarian agent is initialized idempotently, seeding entries from completed workspaces and generating a project-tailored catalog. All entries stored at slug-based paths so reclassification never breaks the filesystem.
