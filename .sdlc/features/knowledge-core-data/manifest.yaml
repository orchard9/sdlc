slug: knowledge-core-data
title: Rust knowledge.rs module — KnowledgeEntry, Catalog, CRUD, storage
description: 'New module crates/sdlc-core/src/knowledge.rs. Reuses workspace.rs for sessions. KnowledgeEntry struct with all fields: code, title, slug, status, tags, summary, sources (Source struct + SourceType enum: web|local|manual|harvested|guideline), related, last_verified_at, staleness_flags (url_404|code_ref_gone|superseded_by|aged_out), origin, harvested_from, created_at, updated_at. Catalog struct + CatalogClass, CatalogDivision, CatalogSection. MaintenanceLog struct + MaintenanceAction enum. validate_code() — regex ^\d{3}(\.\d{1,2}(\.\d)?)?$. CRUD: create, list, get, update, list_by_code_prefix, full_text_search. full_text_search scans both entry.yaml fields (title, summary, tags) AND content.md body — ripgrep-style, returns entries with match excerpts. Storage paths: .sdlc/knowledge/catalog.yaml, .sdlc/knowledge/maintenance-log.yaml, .sdlc/knowledge/<slug>/entry.yaml, .sdlc/knowledge/<slug>/content.md. IMPORTANT: directory name is slug-only — code lives in entry.yaml, NOT in the directory path. This makes reclassification safe: changing a code requires no filesystem rename, only an entry.yaml update.'
