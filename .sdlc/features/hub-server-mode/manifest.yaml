slug: hub-server-mode
title: Hub server mode — heartbeat endpoint, registry, sweep, SSE, persistence
description: New sdlc-server mode (--hub flag) that serves a project navigator instead of a project workspace. Exposes POST /api/hub/heartbeat, maintains in-memory registry with sweep, emits SSE events, and persists state for restart recovery.
