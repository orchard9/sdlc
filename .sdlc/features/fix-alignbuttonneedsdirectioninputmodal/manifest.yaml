slug: fix-alignbuttonneedsdirectioninputmodal
title: Fix Alignbuttonneedsdirectioninputmodal
description: |-
  Root cause: handleAlign in VisionPage.tsx and ArchitecturePage.tsx calls api.runVisionAlign/runArchitectureAlign directly without first opening a modal to collect direction input from the user, so the payload sent to the backend carries no user context.

  Problem: On the Vision and Architecture pages, clicking the 'Align' button immediately fires an API call (runVisionAlign/runArchitectureAlign) with no opportunity for the user to provide directional input or context. This means the agent has no user-supplied direction to align against, making the action a black-box fire-and-forget with no user control over the outcome.

  Original report:
  in vision and architecture, when we hit "align" i expect a modal to pop up and it asks for direction so we can input that
