slug: dev-driver-agentic-dispatch
title: Rewrite dev-driver to dispatch through the agent infrastructure
description: 'Dev-driver currently spawns ''claude --print'' as a raw shell subprocess. This bypasses spawn_agent_run entirely: no RunRecord, no SSE, no activity feed, no visibility in the frontend. The lock file exists because the tool has no way to know if a previous run is still active. Rewrite dispatch to use _shared/agent.ts runAgent() — which calls back through POST /api/tools/agent-call. Server handles the run properly: RunRecord persisted, SSE streamed, activity feed updated, duplicate detection via agent_runs map. Remove the lock file kludge entirely.'
