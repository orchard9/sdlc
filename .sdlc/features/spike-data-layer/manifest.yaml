slug: spike-data-layer
title: Spike data layer — list, load, promote, and reject-to-knowledge
description: Core Rust data layer in sdlc-core/src/spikes.rs. Parses verdict, date, title, and 'The Question' directly from findings.md headers — no separate manifest.yaml. REJECT verdict auto-triggers store_in_knowledge on list load (background, no explicit API call needed). promote_to_ponder records the resulting ponder slug back into a lightweight .sdlc/spikes/<slug>/state.yaml (verdict + ponder_slug only — not full manifest).
