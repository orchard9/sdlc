slug: citadel-webhook-handler
title: Citadel Webhook Handler in Pantheon
description: |
  Tier 1 automatic integration. Add a POST /api/v1/webhooks/citadel route to Pantheon that accepts HMAC-SHA256-signed error threshold webhooks from Citadel and automatically creates Pantheon incidents. Maps Citadel error level to Pantheon severity. Follows the existing Alertmanager webhook handler as a pattern.
