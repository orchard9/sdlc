slug: backlog-cli
title: sdlc backlog CLI commands
description: 'Create crates/sdlc-cli/src/cmd/backlog.rs with BacklogSubcommand enum (Add, List, Park, Promote, Show) and run() dispatch. Add to cmd/mod.rs and main.rs Commands enum. Commands: add <title...> [--description] [--kind concern|idea|debt] [--evidence] [--source-feature]; if --source-feature omitted, auto-infer from most recently active feature in .sdlc/state.yaml (warn if not found, never block). Confirmation output MUST include: ''Backlog item <ID> recorded: "<title>" [<source_feature>]'' — the ID and source are required for agent transcript auditability. list [--all | --status <s>] [--source-feature <slug>] — filter by feature origin. park <id> --reason <reason> — park_reason is required. promote <id> [--slug <feature-slug>] [--milestone <milestone-slug>] — creates feature, optionally links to milestone via sdlc milestone add-feature, outputs new feature slug. show <id>.'
