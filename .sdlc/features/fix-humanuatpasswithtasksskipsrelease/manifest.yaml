slug: fix-humanuatpasswithtasksskipsrelease
title: Fix Humanuatpasswithtasksskipsrelease
description: |-
  Root cause: In submit_milestone_uat_human (runs.rs:1235), the release guard checks `verdict == UatVerdict::Pass` but does not include `UatVerdict::PassWithTasks`, so 'Pass with Tasks' submissions save the run record but never set released_at on the milestone.

  Problem: When submitting a manual UAT with verdict 'Pass with Tasks', the milestone stays in Verifying status instead of advancing to Released. The UI shows the milestone stuck — it doesn't archive/refresh. Only an exact 'Pass' verdict triggers milestone.release().

  Original report:
  when I "Submit Manually" a UAT the milestones doesn't move to archive/refresh, it still stays there
