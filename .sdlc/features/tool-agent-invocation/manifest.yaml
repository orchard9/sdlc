slug: tool-agent-invocation
title: _shared/agent.ts — agent invocation from within tools
description: 'Tools can invoke Claude agent runs from inside their execution. _shared/agent.ts exports runAgent({ prompt, agentFile?, maxTurns? }): Promise<string>. Internally calls POST /api/tools/agent-call on the local sdlc-server using SDLC_AGENT_TOKEN (a per-run token injected by the server as an env var). The server validates the token and spawns the agent via spawn_agent_run, returning the result. Requires tool-streaming-async (non-blocking execution) to avoid deadlock.'
