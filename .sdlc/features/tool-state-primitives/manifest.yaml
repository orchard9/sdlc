slug: tool-state-primitives
title: _shared/sdlc.ts — typed state access for tools
description: 'A shared TypeScript module that tools import to read and write .sdlc/ state files through the correct conventions. Provides: readFeatures(), readMilestones(), readBeat()/writeBeat(), createPonder(), readVision(). No raw filesystem access — everything goes through the same model the CLI uses. Makes tools first-class participants in project state.'
