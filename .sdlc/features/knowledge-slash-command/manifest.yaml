slug: knowledge-slash-command
title: /sdlc-knowledge slash command in init.rs — all four AI CLI platforms
description: 'Add SDLC_KNOWLEDGE_COMMAND (Claude Code markdown with frontmatter), SDLC_KNOWLEDGE_PLAYBOOK (Gemini/OpenCode TOML), and SDLC_KNOWLEDGE_SKILL (agents SKILL.md) constants to crates/sdlc-cli/src/cmd/init.rs. Command behavior: no arg shows catalog overview and entry count by category; <topic> invokes query mode and returns synthesized answer with citations; ''init'' runs knowledge librarian init; ''research <topic>'' runs active research+index; ''maintain'' runs maintenance pass. Register in all four write_user_* functions (Claude, Gemini, OpenCode, Agents). Add ''knowledge-slash-command'' filenames to migrate_legacy_project_scaffolding(). Update GUIDANCE_MD_CONTENT in init.rs: add sdlc knowledge * commands to the CLI reference table in section 6 ''Using sdlc''.'
