slug: backlog-dashboard
title: Backlog section in Dashboard frontend
description: 'Modify frontend/src/pages/Dashboard.tsx to add a Backlog section. Display: open item count badge (e.g. ''3 open''), per-item card showing title + kind badge + source_feature link + timestamp. Empty state copy: ''When an agent finishes a run, it captures concerns that were out of scope for that feature. Items appear here. Promote to create a tracked feature, or Park to set aside. Nothing in the backlog blocks your current work.'' Promote CTA shows tooltip: ''Creates a draft feature. No agent work begins automatically.'' Park CTA prompts for a park_reason note before confirming. Filter by source_feature. Staleness indicator for open items older than 60 days. After promotion: toast with link to new feature.'
