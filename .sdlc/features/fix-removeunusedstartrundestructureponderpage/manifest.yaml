slug: fix-removeunusedstartrundestructureponderpage
title: Fix Removeunusedstartrundestructureponderpage
description: |
  Root cause: `startRun` was likely left behind after a refactor that removed its usage but forgot to remove it from the destructuring assignment.

  Problem: The frontend build fails because `startRun` is destructured from `useAgentRuns()` in PonderPage.tsx but never used anywhere in the file. TypeScript's noUnusedLocals check (TS6133) treats this as a compile error, blocking `tsc -b` and therefore the full `vite build`.

  Original report:
  just install fails with this error:
  npm --prefix frontend ci

  added 549 packages, and audited 550 packages in 4s

  162 packages are looking for funding
    run `npm fund` for details

  found 0 vulnerabilities
  npm --prefix frontend run build

  > sdlc-frontend-scaffold@0.0.0 build
  > tsc -b && vite build

  src/pages/PonderPage.tsx:395:32 - error TS6133: 'startRun' is declared but its value is never read.

  395   const { isRunning, focusRun, startRun } = useAgentRuns()
                                     ~~~~~~~~


  Found 1 error.

  error: Recipe `_frontend` failed on line 146 with exit code 2
