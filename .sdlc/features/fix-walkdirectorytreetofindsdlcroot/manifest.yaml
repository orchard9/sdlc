slug: fix-walkdirectorytreetofindsdlcroot
title: Fix Walkdirectorytreetofindsdlcroot
description: |-
  Root cause: `crates/sdlc-cli/src/root.rs:resolve_root` falls back directly to `std::env::current_dir()` instead of walking ancestor directories to find the nearest `.sdlc/` directory.

  Problem: When `sdlc` is run from a project subdirectory, `resolve_root` returns the current working directory directly without searching parent directories for a `.sdlc/` folder. This causes the CLI to report that the project is not initialized, even though a valid `.sdlc/` directory exists in a parent directory. LLM agents frequently run commands from non-root directories, making this a common failure mode.

  Original report:
  If you run ponder on the command line and you're in a project subdirectory and not the root, you'll get an error saying you need to run sdlc init. Claude and other LLMs constantly forget what directory they're in. The code should walk the directory tree until it finds the right .sdlc directory.
