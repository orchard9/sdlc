slug: citadel-query-logs-tool
title: citadel_query_logs Agent Tool
description: |
  Implement the citadel_query_logs Pantheon agent tool. Params: { query: string (CPL), time_range: string, limit: int }. Calls Citadel GET /api/v1/query with Citadel API key from ToolCredential. Returns log entries + episode context. Agents invoke this from Discord to fetch logs around an incident. Skill instructions must include CPL basics: level:error, service:auth, time:1h, boolean operators, trace_id correlation.
