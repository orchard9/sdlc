slug: beat-tool
title: beat tool — proof-of-concept agentic tool
description: 'The take-a-beat tool built on all three primitives. Input: { scope: ''project''|''<domain>''|''feature:<slug>'', mode: ''evaluate''|''week'' }. Execution: streams progress via NDJSON. State: reads features/milestones/vision via _shared/sdlc.ts. Reasoning: delegates to recruited CTO/CPO agent via _shared/agent.ts (recruits the agent if missing). Output: verdict (on-track|drifting|off-course) + concerns + weekly items. Persists to .sdlc/beat.yaml. This tool proves the full agentic tool pattern works end-to-end.'
