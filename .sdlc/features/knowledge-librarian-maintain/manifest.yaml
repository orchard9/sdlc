slug: knowledge-librarian-maintain
title: sdlc knowledge librarian run — maintenance pass + harvest hooks wired
description: 'CLI: sdlc knowledge librarian run [--mode maintain|harvest] — spawns librarian maintenance agent run via spawn_agent_run. Maintenance mode checks: (1) URL health: fetch web sources, flag 404s in staleness_flags; (2) code ref health: grep for referenced symbols, flag code_ref_gone; (3) duplication: flag same-tags+code-prefix+similar-title entries; (4) catalog fitness: suggest subdivisions for categories >10 entries, flag empty; (5) cross-ref suggestions: similar-tags entries lacking mutual refs; (6) harvest pending: find completed workspaces not yet harvested, run harvest. All writes autonomous, logged to .sdlc/knowledge/maintenance-log.yaml, committed to git with ''librarian:'' prefix commit message. Server: POST /api/knowledge/maintain spawns maintenance run; POST /api/knowledge/harvest {type:''investigation''|''ponder'', slug} triggers harvest for specific workspace. SSE: KnowledgeMaintenanceStarted, KnowledgeMaintenanceCompleted {actions_taken}. Hook wiring: modify sdlc-cli investigation and ponder ''update --status complete'' paths to call knowledge librarian harvest automatically.'
phase: qa
