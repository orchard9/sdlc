slug: orchestrator-tick-cli
title: sdlc orchestrate daemon — tick loop and add/list subcommands
description: 'Add crates/sdlc-cli/src/cmd/orchestrate.rs. sdlc orchestrate [--tick-rate <secs, default 60>] [--db <path>]: tick loop daemon. On start: startup_recovery(2*tick_rate). Loop: range_due() -> for each: set Running -> run_tool(''--run'', tool_input) -> set Completed{result}|Failed{reason} -> reschedule if recurrence set. Sleep max(0, tick_rate - elapsed). sdlc orchestrate add <label> --tool <name> --input <json> [--at <rfc3339|now+Ns>] [--every <secs>]: insert Pending action. sdlc orchestrate list: print table of all actions. Add .sdlc/orchestrator.db to .gitignore.'
