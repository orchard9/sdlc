slug: orchestrator-webhook-storage
title: HTTP webhook receiver and raw payload storage in redb
description: 'Add webhooks redb table to ActionDb (key: uuid bytes, value: raw body + metadata). Add POST /webhooks/:route to sdlc-server — accepts any body, stores raw bytes + received_at + route_path. Add WebhookPayload struct to sdlc-core. ActionDb gains: insert_webhook(payload), all_pending_webhooks(), delete_webhook(id). No transformation on ingress — store exactly what arrived.'
