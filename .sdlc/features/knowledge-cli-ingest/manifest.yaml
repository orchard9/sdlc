slug: knowledge-cli-ingest
title: sdlc knowledge CLI commands and server CRUD routes
description: 'CLI in crates/sdlc-cli/src/cmd/knowledge.rs. Commands: sdlc knowledge add --title --code [--from-url <url>] [--from-file <path>] [--content ''...'']. NOTE: in v10, --from-url stores the URL as a source reference and fetches the page title/meta description via basic HTTP (no agent synthesis — that is v11). --from-file reads file content directly. --content accepts inline text. --code is optional; if omitted, entry is created with status:draft and code:uncategorized pending future classification. sdlc knowledge status — shows: initialized yes/no, entry count, catalog category count, last-maintained date; returns informative message if not initialized. sdlc knowledge list [--code-prefix ''100''] [--tag t] [--status draft|published] [--json] — table output with columns: code, title (truncated), summary (first 60 chars), status, updated. sdlc knowledge show <slug> [--json] — default (non-JSON) output renders: code badge, title, summary, tags, sources list, then content.md as plain text; --json returns full entry + content. sdlc knowledge search ''<query>'' [--json] — full-text search across title+summary+tags+content.md; returns entries with match excerpts. sdlc knowledge update <slug> [--code] [--status published] [--tag t] [--related code] — code update modifies entry.yaml only, no directory rename needed (directory is slug-based). sdlc knowledge catalog show [--json]; sdlc knowledge catalog add --code --name [--description]. sdlc knowledge session log/list/read (delegates to workspace.rs). Empty-state behavior: if no entries exist, list/search/show return informative message ''Knowledge base not initialized. Run sdlc knowledge librarian init to seed from your project.'' Server routes in crates/sdlc-server/src/routes/knowledge.rs: GET /api/knowledge/catalog, GET /api/knowledge (with ?code= and ?tag= filters), POST /api/knowledge, GET /api/knowledge/:slug (returns entry + content), PUT /api/knowledge/:slug, POST /api/knowledge/:slug/capture, GET /api/knowledge/:slug/sessions, GET /api/knowledge/:slug/sessions/:n.'
