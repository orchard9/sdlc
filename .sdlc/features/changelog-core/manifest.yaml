slug: changelog-core
title: Changelog event log core — append-only persistent event source
description: 'Append-only .sdlc/changelog.yaml with 7 high-signal event kinds (feature_merged, run_failed, milestone_wave_completed, feature_phase_advanced, review_approved, audit_approved, qa_approved). All events include a slug field populated from context (for run_failed: extracted from the run key, e.g. ''sdlc-run:my-feature'' → slug ''my-feature''). query_events() tail-reads the file rather than loading it fully into memory — safe for long-lived projects. Mtime watcher triggers SSE ChangelogUpdated on change.'
