slug: knowledge-page-ui
title: KnowledgePage — three-pane catalog browser in the sdlc UI
description: 'frontend/src/pages/KnowledgePage.tsx — three-pane layout. Left pane: catalog tree (expandable classes/divisions, click to filter) + search bar for full-text filter. Center pane: entry list for selected class/division showing title, code badge, staleness badges (url_404, aged_out, code_ref_gone), last_updated. Right pane: entry detail — content.md rendered as markdown, source provenance footer (type+url/path+captured_at per source), related entry links clickable by code, [Research More] action button that triggers POST /api/knowledge/:slug/research. Sidebar: Library icon (lucide), below Guidelines in Plan group. Bottom tab bar: Knowledge in Plan tab roots. Routes: /knowledge and /knowledge/:slug. No PhaseStrip — entries have no phases. SSE listener for KnowledgeResearchCompleted and KnowledgeMaintenanceCompleted to trigger entry list refresh.'
