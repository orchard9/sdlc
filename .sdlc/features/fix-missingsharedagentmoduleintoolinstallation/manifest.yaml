slug: fix-missingsharedagentmoduleintoolinstallation
title: Fix Missingsharedagentmoduleintoolinstallation
description: |-
  Root cause: `agent.ts` was added to the `_shared/` library in this repo but was not included in the `sdlc tool sync` / installation artifact that gets distributed to consumer projects, so consumer projects have the updated `dev-driver/tool.ts` that references it but not the file itself.

  Problem: The dev-driver tool at `/Users/xist/.../buildbot/.sdlc/tools/dev-driver/tool.ts` imports `../_shared/agent.ts` which does not exist in that project's `_shared/` directory. This causes a hard crash on every `GET /api/tools` request, making the tools list endpoint completely broken for that user.

  Original report:
  2026-03-04T22:58:37.170637Z  INFO → method=GET path=/api/tools
  node:internal/modules/cjs/loader:1421
    const err = new Error(message);
                ^

  Error: Cannot find module '../_shared/agent.ts'
  Require stack:
  - /Users/xist/dev/MasqMain/subs/LivelyVideo/buildbot/.sdlc/tools/dev-driver/tool.ts
      at node:internal/modules/cjs/loader:1421:15
      at nextResolveSimple (/Users/xist/.npm/_npx/fd45a72a545557e9/node_modules/tsx/dist/register-D46fvsV_.cjs:4:1004)
      at /Users/xist/.npm/_npx/fd45a72a545557e9/node_modules/tsx/dist/register-D46fvsV_.cjs:3:2630
      at /Users/xist/.npm/_npx/fd45a72a545557e9/node_modules/tsx/dist/register-D46fvsV_.cjs:3:1542
      at resolveTsPaths (/Users/xist/.npm/_npx/fd45a72a545557e9/node_modules/tsx/dist/register-D46fvsV_.cjs:4:760)
      at /Users/xist/.npm/_npx/fd45a72a545557e9/node_modules/tsx/dist/register-D46fvsV_.cjs:4:1102
      at m._resolveFilename (file:///Users/xist/.npm/_npx/fd45a72a545557e9/node_modules/tsx/dist/register-B7jrtLTO.mjs:1:789)
      at defaultResolveImpl (node:internal/modules/cjs/loader:1059:19)
      at resolveForCJSWithHooks (node:internal/modules/cjs/loader:1064:22)
      at Module._load (node:internal/modules/cjs/loader:1227:37) {
    code: 'MODULE_NOT_FOUND',
    requireStack: [
      '/Users/xist/dev/MasqMain/subs/LivelyVideo/buildbot/.sdlc/tools/dev-driver/tool.ts'
