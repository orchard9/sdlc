slug: tool-streaming-async
title: Streaming + async tool execution
description: Wire the streaming:true meta flag end-to-end. Streaming tools emit NDJSON progress lines to stdout; the server relays them as SSE events to the frontend. Tool execution becomes non-blocking — server returns a job ID immediately, tool runs in background, frontend subscribes to progress. Produces RunRecord entries like agent runs.
