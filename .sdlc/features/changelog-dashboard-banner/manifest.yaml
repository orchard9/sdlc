slug: changelog-dashboard-banner
title: Dashboard What Changed banner — since-your-last-visit event feed
description: 'Dashboard WhatChangedBanner component with two modes: (1) returning user — shows count + relative time since last_visit_at from localStorage, failed runs listed first; (2) first visit (no last_visit_at) — shows last 7 days under ''Recent project activity'' header instead of nothing. Only the Dismiss button updates last_visit_at — SPA navigation within the app does NOT reset it, so the banner persists across page changes until explicitly dismissed.'
