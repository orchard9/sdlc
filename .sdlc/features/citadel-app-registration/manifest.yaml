slug: citadel-app-registration
title: Register Citadel as a Pantheon App
description: |
  Tier 2 foundation. Register Citadel in Pantheon's App Platform with ToolDefinitions (JSON schema for each agent tool) and ToolCredential support (Citadel API key stored encrypted, org-scoped). Establishes the credential management pattern for Citadel API keys (format: ck_<env>_<org>_<random>) and enables tool execution via Pantheon's existing auth + HTTP plumbing.
