slug: knowledge-research-mode
title: sdlc knowledge research — agent-driven multi-source research with sessions
description: 'CLI: sdlc knowledge research ''<topic>'' [--code ''100.20''] — spawns agent research run via spawn_agent_run. Agent performs multi-source research (web search + local file scan), synthesizes findings into a comprehensive entry, logs research sessions via workspace.rs session protocol. Research sessions stored in .sdlc/knowledge/<code-dashed>-<slug>/sessions/. Server: POST /api/knowledge/:slug/research spawns research agent run (or creates entry first if slug not provided). SSE: KnowledgeResearchStarted {slug}, KnowledgeResearchCompleted {slug}. QueryOptions: max_turns 20, web search tools, file read tools. Uses same spawn_agent_run pattern as investigation chat.'
