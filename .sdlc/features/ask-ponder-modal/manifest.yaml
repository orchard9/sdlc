slug: ask-ponder-modal
title: AskPonderModal — input, streaming answer, open-as-thread
description: 'New modal component AskPonderModal.tsx with three states: input (textarea + Ask button), answering (source chips + streaming AmaAnswerPanel), answered (full answer + Open as Thread action). Reuses api.answerAma() and AmaAnswerPanel — no new backend. Wired into AppShell (askOpen state, ⌘/ shortcut) and Sidebar (HelpCircle button, onAskPonder prop).'
