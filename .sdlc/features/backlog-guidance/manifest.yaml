slug: backlog-guidance
title: Guidance and agent command template updates for backlog
description: 'Add backlog commands to §6 CLI table in .sdlc/guidance.md. Add §12 Session Close Protocol section: CRITICAL — capture must happen at the moment of discovery, not deferred to session end. If you defer and the run crashes, the concern is lost. Session-close review is additive. Add title quality protocol: title must be a complete sentence describing the concern with a file or component reference, e.g. ''AuthMiddleware in auth.rs: token validation has a race condition under concurrent requests.'' Add vocabulary section: backlog items (cross-feature, dormant, written by agents) vs tasks (in-feature, active, written by agents and humans). Update GUIDANCE_MD_CONTENT §6 table in crates/sdlc-cli/src/cmd/init.rs. Update sdlc-run and sdlc-next command templates: add ''Discovered out-of-scope concerns'' instruction specifying IMMEDIATE capture at moment of discovery, with example of a well-formed title.'
