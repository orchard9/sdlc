slug: backlog-server
title: REST API routes for backlog in sdlc-server
description: 'Create crates/sdlc-server/src/routes/backlog.rs with handlers: list (GET /api/backlog, supports ?status=open|parked|promoted and ?source_feature=<slug>), create (POST /api/backlog with title, description, kind, evidence, source_feature fields), park (POST /api/backlog/:id/park with required park_reason body field), promote (POST /api/backlog/:id/promote with optional slug and milestone_slug body fields). Add pub mod backlog to routes/mod.rs. Register all routes in lib.rs. Include route integration tests.'
