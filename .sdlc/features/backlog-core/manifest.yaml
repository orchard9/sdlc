slug: backlog-core
title: BacklogItem data model and storage in sdlc-core
description: 'Create crates/sdlc-core/src/backlog.rs with BacklogItem struct and BacklogStatus enum. BacklogItem fields: id (B1/B2... sequential), title (required, complete sentence), description (optional, multi-line context), kind (BacklogKind: Concern | Idea | Debt), status (BacklogStatus: Open | Parked | Promoted), park_reason (optional String, required when parking), evidence (optional String, short file/function reference grounding the concern), source_feature (optional String, auto-inferred from state.yaml if not provided), promoted_to (optional String, feature slug), created_at, updated_at. Implement: add, list (with source_feature filter), park (requires park_reason), promote (calls sdlc feature create internally), get, load_all, save_all. Add BACKLOG_FILE const and backlog_path() to paths.rs. Register pub mod backlog in lib.rs. Add BacklogItemNotFound(String) to error.rs. Unit tests for all operations including round-trip and source_feature filter.'
