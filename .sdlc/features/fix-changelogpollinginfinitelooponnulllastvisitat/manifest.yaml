slug: fix-changelogpollinginfinitelooponnulllastvisitat
title: Fix Changelogpollinginfinitelooponnulllastvisitat
description: |-
  Root cause: `since` is derived from `Date.now()` inline on every render when `lastVisitAt` is null, making it a non-stable value that invalidates `useCallback` and re-triggers the fetch effect on every render cycle.

  Problem: When `lastVisitAt` is null (first-time visitor), `since` is computed as `new Date(Date.now() - SEVEN_DAYS_MS).toISOString()` on every render, producing a slightly different string each time. Because `since` is a `useCallback` dependency, a new `refresh` function is created on every render. The `useEffect(() => { refresh() }, [refresh])` then fires on every render, which calls fetch, which calls `setEvents`/`setTotal`, which triggers another render — creating an infinite tight loop of changelog API calls.

