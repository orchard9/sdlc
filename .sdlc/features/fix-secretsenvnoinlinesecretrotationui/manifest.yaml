slug: fix-secretsenvnoinlinesecretrotationui
title: Fix Secretsenvnoinlinesecretrotationui
description: |-
  Root cause: The backend has no PATCH/PUT endpoint for updating an individual secret within an existing env (only POST to create and DELETE to destroy the whole env), and the frontend `SecretsPage.tsx` never renders any edit controls per secret key — the env card shows only key names as read-only badges with no rotate/update affordance.

  Problem: The /secrets page shows environment cards with a CLI hint for setting individual secrets (`sdlc secrets env set <env> KEY=value`), but there is no inline UI to update or rotate individual secret values within an existing environment. Users can only create a new environment or delete the entire environment — there is no per-key edit/rotate action in the frontend. The impact is that rotating a compromised or expired secret requires CLI access, defeating the purpose of the web UI.

  Original report:
  in "/secrets" - i have a way to add environments, but once an environment is added i dont have a way to modify the values within that environment, i need a way to rotate the secrets of individual items
