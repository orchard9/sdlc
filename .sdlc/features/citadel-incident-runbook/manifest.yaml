slug: citadel-incident-runbook
title: Create Incident from Citadel Logs Runbook
description: |
  Implement a Pantheon Runbook for the full triage loop: Step 1 (command: citadel_query_logs for the relevant time window) → Step 2 (command: citadel_annotate_log on key entries with "linked to incident-{id}") → Step 3 (command: create Pantheon incident with log summary + episode link). Models "create ticket based on logs" as a multi-step runbook rather than a monolithic tool call, fitting Pantheon's existing runbook execution model. Discord trigger: "create incident from logs around <time> for <service>".
