slug: fleet-native-oauth
title: Built-in Google OAuth2 in sdlc-server hub mode — replace oauth2-proxy
description: Add native OAuth2 route handlers (login, callback, verify, logout) to sdlc-server hub mode. Sessions via signed cookies scoped to .sdlc.threesix.ai. Eliminates oauth2-proxy sidecar — one process, zero external session stores.
