comments:
- id: C1
  author: null
  body: 'T2 decision: NewIdeaModal has grown to include ponder-text-file-preload file attachment features (drag-and-drop, file chips, multi-file upload). Refactoring it to use CreateWorkspaceModal would require extending the shared component with file upload support that is Ponder-specific. Decision: NewIdeaModal stays as-is and owns its own form implementation. CreateWorkspaceModal targets the three investigation-type pages (InvestigationPage, EvolvePage, GuidelinePage) which have identical simple inline forms with no custom extensions.'
  flag: null
  target:
    kind: feature
  created_at: 2026-03-04T23:40:56.454776Z
