slug: fix-pondercommittedactionshouldlinktomilestone
title: Fix Pondercommittedactionshouldlinktomilestone
description: |-
  Root cause: The PonderPage.tsx committed-state action (lines 509-533) unconditionally renders a 'Prepare' button for the first committed milestone, without checking whether preparation is the appropriate next step — the correct action for a committed ponder is to navigate to the milestone.

  Problem: On the ponder detail page (/ponder/iterative-ponder), when a ponder has status 'committed' and has committed milestones, the action button still shows 'Prepare' (to re-run milestone preparation). Since the ponder's job is done once committed, the action should instead direct the user to the milestone — e.g. 'View Milestone' or 'Go to Milestone' — rather than offering to prepare it again.

  Original report:
  on this page /ponder/iterative-ponder
  the "prepare" button is active, but the ponder session has already been prepared and there is now a milestone for it. fix the status of the ponder and change the action item in this case to go edit the milestone, however that is best said in sdlc talk.
