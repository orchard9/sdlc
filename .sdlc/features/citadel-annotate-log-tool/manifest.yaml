slug: citadel-annotate-log-tool
title: citadel_annotate_log Agent Tool
description: |
  Implement the citadel_annotate_log Pantheon agent tool. Params: { log_id: string, content: string, annotation_type: string }. Calls Citadel POST /api/v1/annotations with author_type: "ai_agent" — Citadel explicitly supports AI agent annotations. annotation_type values: note | bug | root_cause | false_positive | incident. Returns annotation ID + timestamp. Enables agents to link Citadel log entries to Pantheon incidents and tasks, keeping observability and task layers connected.
