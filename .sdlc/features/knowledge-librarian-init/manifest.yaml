slug: knowledge-librarian-init
title: sdlc knowledge librarian init — project scan, catalog gen, agent file, hooks
description: 'sdlc knowledge librarian init command. IDEMPOTENT — safe to run multiple times; each step is a no-op if already complete. 9-step flow: (1) project scan — read VISION.md, ARCHITECTURE.md, CLAUDE.md, .sdlc/config.yaml; (2) workspace harvest — for each completed investigation and committed ponder, extract durable insights (root cause hypotheses, decided constraints, evolution paths) and create draft knowledge entries; (3) guideline linking — for each published guideline, create a knowledge entry with origin:guideline; (4) domain extraction — identify 5-7 knowledge domains from harvested entries and existing docs; (5) catalog generation — write .sdlc/knowledge/catalog.yaml with derived categories (no-op if catalog already exists); (6) librarian agent generation — write .claude/agents/knowledge-librarian.md with project name, full catalog, and key architectural context baked in (overwrites to pick up catalog changes); (7) hook registration — document harvest hooks in .sdlc/config.yaml; (8) cross-ref pass — suggest related[] links between newly seeded entries with matching tags; (9) report — N entries created, M entries updated, catalog categories, librarian agent written. Failure handling: each step reports success/failure independently; partial init is recoverable by re-running the command. Harvest protocol: for each durable insight, check for existing matching entry by slug (same title normalized), append to content.md if exists, create new entry if not, record harvested_from, log to maintenance-log.yaml. Durable insight extraction rules: from root-cause (hypothesis + fix approach), from evolve (lens scores + chosen paths), from ponder (Decided: entries + surfaced constraints). NOT harvested: transient symptom details, specific file paths, raw exploratory dialogue.'
