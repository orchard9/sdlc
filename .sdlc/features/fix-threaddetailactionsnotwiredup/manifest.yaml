slug: fix-threaddetailactionsnotwiredup
title: Fix Threaddetailactionsnotwiredup
description: |-
  Root cause: The action buttons in ThreadDetailPane.tsx (lines 86–100) are stub placeholders marked 'coming soon'; no delete button was added, no callback props exist on the component, no api.deleteThread method exists in client.ts, and there are no synthesize or promote-to-ponder API endpoints on the server.

  Problem: The thread detail pane has 'Synthesize' and 'Promote to Ponder' buttons hardcoded as `disabled` with cursor-not-allowed, and there is no Delete button at all. Users cannot perform any of these three actions from the thread detail view even though the backend DELETE endpoint already exists and is tested.

  Original report:
  we need a way to be able to delete threads in e.g., in /threads/20260303-general-2

  delete, synthesize, promote to ponder
