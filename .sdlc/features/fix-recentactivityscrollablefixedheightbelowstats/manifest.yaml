slug: fix-recentactivityscrollablefixedheightbelowstats
title: Fix Recentactivityscrollablefixedheightbelowstats
description: |-
  Root cause: WhatChangedBanner is placed at line 218 of Dashboard.tsx before the project overview section (line 220) and stats bar (line 239), and uses an unconstrained `space-y-0.5` div with a client-side expand toggle instead of a `max-h` + `overflow-y-auto` scrollable container positioned after the stats.

  Problem: The 'Recent project activity' WhatChangedBanner renders above the project header and stats bar, breaking the expected top-down flow. The event list has no fixed height or scroll container — it expands unboundedly inline via a 'See more' toggle, making the page layout shift unpredictably depending on how many events exist.

  Original report:
  i dont like the layout of the recent project activity because its not consistent flow, i think it can be a scrollable component with fixed height under the stats and should be a major event
