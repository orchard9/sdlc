slug: knowledge-query-mode
title: sdlc knowledge ask — librarian query mode via spawn_agent_run
description: 'CLI: sdlc knowledge ask ''<question>'' — invokes librarian agent via spawn_agent_run with question plus full knowledge base catalog and entry summaries as context. Returns synthesized answer with cited entry codes. If a gap is detected, suggests sdlc knowledge research <topic>. Server: POST /api/knowledge/ask body:{question} spawns agent run and streams via SSE. SSE events: KnowledgeQueryStarted {question}, KnowledgeQueryCompleted {answer, cited_entries:[{slug,code,title}]}. Add SseMessage variants to state.rs. QueryOptions: max_turns 10, web search tools allowed for librarian to pull recent context.'
