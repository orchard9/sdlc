slug: fix-assistanttextblockmissingmarkdownrendering
title: Fix Assistanttextblockmissingmarkdownrendering
description: |-
  Root cause: AssistantTextBlock.tsx uses a plain <p> element to display event.text instead of using the CompactMarkdown component that already exists in the codebase and handles code fences, inline code, and other markdown features.

  Problem: The AssistantTextBlock component in the agent activity feed renders agent output as plain text using a <p> tag with whitespace-pre-wrap. Markdown syntax like code blocks, bold, lists, and inline code appears as raw text instead of being rendered as formatted HTML.

  Original report:
  the markdown in the agent activity should render as code blocks
