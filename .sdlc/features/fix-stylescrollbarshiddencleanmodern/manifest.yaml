slug: fix-stylescrollbarshiddencleanmodern
title: Fix Stylescrollbarshiddencleanmodern
description: |-
  Root cause: index.css has no scrollbar CSS rules — neither webkit pseudo-elements (`::-webkit-scrollbar`) nor the standard `scrollbar-width: none` / `scrollbar-color` properties — so the browser renders default platform scrollbars everywhere.

  Problem: The frontend has no scrollbar styling applied globally or on scrollable containers. Native OS scrollbars appear throughout the app (sidebars, panels, modals, logs, markdown content, etc.), looking inconsistent and clashing with the dark minimal design aesthetic. This affects every scrollable surface in the UI.

  Original report:
  all scrollbars need to be styled to be hidden/clean/modern
