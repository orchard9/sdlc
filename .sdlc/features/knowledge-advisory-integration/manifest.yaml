slug: knowledge-advisory-integration
title: Advisory runs draw from knowledge base — inject relevant entries as context
description: 'Modify crates/sdlc-server/src/routes/advisory.rs: before building the advisory agent prompt, query the knowledge base for relevant entries (top-N by tag intersection + recency, N=10). Inject as a ''Project Knowledge'' context block in the advisory prompt: each entry shows its code, title, and summary. This prevents the advisory system from re-discovering patterns already captured. The advisory output should cite relevant knowledge entries when they inform findings. Add GET /api/knowledge/relevant?tags=a,b&limit=10 server endpoint to support this query pattern.'
