slug: fix-pondercommittedmilestonelinkwrongroute
title: Fix Pondercommittedmilestonelinkwrongroute
description: |-
  Root cause: PonderPage.tsx line 511 constructs the link with `/milestone/` but the React Router route is defined as `/milestones/:slug` in App.tsx.

  Problem: On the /ponder/iterative-ponder page, the 'committed to' milestone link points to `/milestone/<slug>` (singular) instead of `/milestones/<slug>` (plural). This results in a 404 or blank page when clicking the milestone link from a ponder entry.

  Original report:
  the milestone link on /ponder/iterative-ponder is wrong, it links to `/milestone/` instead of `/milestones/`
